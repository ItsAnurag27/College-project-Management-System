apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: project-anurag
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: mrudul/gateway:latest
        ports:
        - containerPort: 3000
